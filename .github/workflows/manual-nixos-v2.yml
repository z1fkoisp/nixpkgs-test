name: Build NixOS manual v2
'on':
  pull_request:
    paths:
    - .github/workflows/manual-nixos-v2.yml
  pull_request_target:
    branches:
    - master
    paths:
    - nixos/**
    - doc/**
    - lib/**
permissions: {}
jobs:
  nixos:
    name: nixos-manual-build
    strategy:
      fail-fast: false
      matrix:
        include:
        - runner: ubuntu-24.04
          system: x86_64-linux
        - runner: ubuntu-latest
          system: aarch64-linux
    runs-on: ${{ matrix.runner }}
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      with:
        ref: refs/pull/${{ github.event.pull_request.number }}/merge
    - uses: cachix/install-nix-action@526118121621777ccd86f79b04685a9319637641
      with:
        extra_nix_config: sandbox = true
    - uses: cachix/cachix-action@0fc020193b5a1fa3ac4575aa3a7d3aa6a35435ad
      with:
        name: nixpkgs-ci
        authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
    - name: Build NixOS manual
      id: build-manual
      run: NIX_PATH=nixpkgs=$(pwd) nix-build --option restrict-eval true ci -A manual-nixos
        --argstr system ${{ matrix.system }}
    - name: Upload NixOS manual
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: nixos-manual-${{ matrix.system }}
        path: result/
        if-no-files-found: error
