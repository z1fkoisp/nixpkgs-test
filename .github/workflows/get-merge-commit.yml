name: Get merge commit
'on':
  pull_request:
    paths:
    - .github/workflows/get-merge-commit.yml
  workflow_call:
    outputs:
      mergedSha:
        description: The merge commit SHA
        value: ${{ jobs.resolve-merge-commit.outputs.mergedSha }}
      targetSha:
        description: The target commit SHA
        value: ${{ jobs.resolve-merge-commit.outputs.targetSha }}
      systems:
        description: The supported systems
        value: ${{ jobs.resolve-merge-commit.outputs.systems }}
permissions: {}
jobs:
  resolve-merge-commit:
    runs-on: ubuntu-latest
    outputs:
      mergedSha: ${{ steps.merged.outputs.mergedSha }}
      targetSha: ${{ steps.merged.outputs.targetSha }}
      systems: ${{ steps.systems.outputs.systems }}
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      with:
        path: base
        sparse-checkout: ci
    - name: Check if the PR can be merged and get the test merge commit
      id: merged
      env:
        GH_TOKEN: ${{ github.token }}
        GH_EVENT: ${{ github.event_name }}
      run: "case \"$GH_EVENT\" in\n  push)\n    echo \"mergedSha=${{ github.sha }}\"\
        \ >> \"$GITHUB_OUTPUT\"\n    ;;\n  pull_request*)\n    if commits=$(base/ci/get-merge-commit.sh\
        \ ${{ github.repository }} ${{ github.event.number }}); then\n      echo -e\
        \ \"Checking the commits:\\n$commits\"\n      echo \"$commits\" >> \"$GITHUB_OUTPUT\"\
        \n    else\n      # Skipping so that no notifications are sent\n      echo\
        \ \"Skipping the rest...\"\n    fi\n    ;;\nesac\n"
    - name: Load supported systems
      id: systems
      run: 'echo "systems=$(jq -c <base/ci/supportedSystems.json)" >> "$GITHUB_OUTPUT"

        '
