name: Check that files are formatted
'on':
  pull_request:
    paths:
    - .github/workflows/check-format.yml
  pull_request_target: null
permissions: {}
jobs:
  get-merge-commit:
    uses: ./.github/workflows/get-merge-commit.yml
  nixos:
    name: fmt-check
    runs-on: ubuntu-latest
    needs: get-merge-commit
    if: needs.get-merge-commit.outputs.mergedSha
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      with:
        ref: ${{ needs.get-merge-commit.outputs.mergedSha }}
    - uses: cachix/install-nix-action@526118121621777ccd86f79b04685a9319637641
      with:
        extra_nix_config: sandbox = true
    - name: Check that files are formatted
      run: "# Note that it's fine to run this on untrusted code because:\n# - There's\
        \ no secrets accessible here\n# - The build is sandboxed\nif ! nix-build ci\
        \ -A fmt.check; then\n  echo \"Some files are not properly formatted\"\n \
        \ echo \"Please format them by going to the Nixpkgs root directory and running\
        \ one of:\"\n  echo \"  nix-shell --run treefmt\"\n  echo \"  nix develop\
        \ --command treefmt\"\n  echo \"  nix fmt\"\n  echo \"Make sure your branch\
        \ is up to date with master; rebase if not.\"\n  echo \"If you're having trouble,\
        \ please ping @NixOS/nix-formatting\"\n  exit 1\nfi\n"
