name: Label PR
'on':
  pull_request_target: null
permissions:
  contents: read
  pull-requests: write
jobs:
  labels:
    name: label-pr
    runs-on: ubuntu-latest
    if: github.repository_owner == 'NixOS' && !contains(github.event.pull_request.title,
      '[skip treewide]')
    steps:
    - uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9
      if: "github.event.pull_request.head.repo.owner.login != 'NixOS' || !(\n  github.head_ref\
        \ == 'haskell-updates' ||\n  github.head_ref == 'python-updates' ||\n  github.head_ref\
        \ == 'staging-next' ||\n  startsWith(github.head_ref, 'staging-next-')\n)\n"
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        configuration-path: .github/labeler.yml
        sync-labels: true
    - uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9
      if: "github.event.pull_request.head.repo.owner.login != 'NixOS' || !(\n  github.head_ref\
        \ == 'haskell-updates' ||\n  github.head_ref == 'python-updates' ||\n  github.head_ref\
        \ == 'staging-next' ||\n  startsWith(github.head_ref, 'staging-next-')\n)\n"
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        configuration-path: .github/labeler-no-sync.yml
        sync-labels: false
    - uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9
      if: "github.event.pull_request.head.repo.owner.login == 'NixOS' && (\n  github.head_ref\
        \ == 'haskell-updates' ||\n  github.head_ref == 'python-updates' ||\n  github.head_ref\
        \ == 'staging-next' ||\n  startsWith(github.head_ref, 'staging-next-')\n)\n"
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        configuration-path: .github/labeler-development-branches.yml
        sync-labels: true
